{% extends "base.html" %}

{% block title %}Test Panel Login - Sigma SMS A2P{% endblock %}

{% block body %}
<div class="min-h-screen bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center p-4">
    <div class="absolute inset-0 overflow-hidden">
        <div class="absolute w-96 h-96 bg-white opacity-10 rounded-full blur-3xl animate-float" style="top: 20%; left: 20%;"></div>
        <div class="absolute w-96 h-96 bg-white opacity-10 rounded-full blur-3xl animate-float" style="top: 50%; right: 20%; animation-delay: 1.5s;"></div>
    </div>
    
    <div class="relative z-10 w-full max-w-md" x-data="testLoginForm()">
        <div class="text-center mb-8 animate-slideInDown">
            <div class="inline-block p-4 bg-white rounded-full shadow-lg mb-4">
                <i class="fas fa-flask text-4xl text-blue-600"></i>
            </div>
            <h1 class="text-4xl font-bold text-white mb-2">Test Panel</h1>
            <p class="text-blue-100">Test SMS Numbers & OTP Reception</p>
        </div>
        
        <div class="glass-effect rounded-2xl shadow-2xl p-8 animate-fadeInUp">
            <h2 class="text-2xl font-bold text-white mb-6 text-center">Test Access</h2>
            
            <form @submit.prevent="login" class="space-y-6">
                <div>
                    <label class="block text-white text-sm font-medium mb-2">
                        <i class="fas fa-user mr-2"></i>Username
                    </label>
                    <input 
                        type="text" 
                        x-model="username"
                        class="w-full px-4 py-3 bg-white bg-opacity-20 border border-white border-opacity-30 rounded-lg text-white placeholder-blue-200 focus:outline-none focus:ring-2 focus:ring-white transition"
                        placeholder="test123"
                        required
                    >
                </div>
                
                <div>
                    <label class="block text-white text-sm font-medium mb-2">
                        <i class="fas fa-lock mr-2"></i>Password
                    </label>
                    <input 
                        type="password"
                        x-model="password"
                        class="w-full px-4 py-3 bg-white bg-opacity-20 border border-white border-opacity-30 rounded-lg text-white placeholder-blue-200 focus:outline-none focus:ring-2 focus:ring-white transition"
                        placeholder="test123"
                        required
                    >
                </div>
                
                <button 
                    type="submit"
                    :disabled="loading"
                    class="w-full py-3 bg-white text-blue-600 rounded-lg font-bold hover:bg-opacity-90 transition transform hover:scale-105 disabled:opacity-50"
                >
                    <span x-show="!loading">
                        <i class="fas fa-sign-in-alt mr-2"></i>Access Test Panel
                    </span>
                    <span x-show="loading">
                        <i class="fas fa-spinner fa-spin mr-2"></i>Logging in...
                    </span>
                </button>
            </form>
            
            <div class="mt-6 text-center">
                <a href="/login" class="text-white hover:text-blue-200 transition text-sm">
                    <i class="fas fa-arrow-left mr-2"></i>Back to Main Panel
                </a>
            </div>
        </div>
        
        <div class="text-center mt-6 text-white text-sm animate-fadeInUp" style="animation-delay: 0.2s;">
            <p>Default: test123 / test123</p>
        </div>
    </div>
</div>

<script>
    function testLoginForm() {
        return {
            username: 'test123',
            password: 'test123',
            loading: false,
            
            async login() {
                this.loading = true;
                
                try {
                    const response = await fetch('/api/test/login', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            username: this.username,
                            password: this.password
                        })
                    });
                    
                    const data = await response.json();
                    
                    if (response.ok) {
                        showToast('Login successful!', 'success');
                        setTimeout(() => {
                            window.location.href = '/test-dashboard';
                        }, 1000);
                    } else {
                        showToast(data.detail || 'Login failed', 'error');
                    }
                } catch (error) {
                    showToast('Network error. Please try again.', 'error');
                } finally {
                    this.loading = false;
                }
            }
        }
    }
</script>
{% endblock %}
