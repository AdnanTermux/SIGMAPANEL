{% extends "base.html" %}

{% block title %}Login - Sigma SMS A2P{% endblock %}

{% block body %}
<div class="min-h-screen gradient-bg flex items-center justify-center p-4">
    <div class="absolute inset-0 overflow-hidden">
        <div class="absolute w-96 h-96 bg-white opacity-10 rounded-full blur-3xl animate-float" style="top: 10%; left: 10%;"></div>
        <div class="absolute w-96 h-96 bg-white opacity-10 rounded-full blur-3xl animate-float" style="top: 60%; right: 10%; animation-delay: 1s;"></div>
    </div>

    <div class="relative z-10 w-full max-w-md" x-data="loginForm()">
        <div class="text-center mb-8 animate-slideInDown">
            <div class="inline-block p-4 bg-white rounded-full shadow-lg mb-4">
                <i class="fas fa-sms text-4xl" style="color:#735DFF;"></i>
            </div>
            <h1 class="text-4xl font-bold text-white mb-2">Sigma SMS A2P</h1>
            <p class="text-purple-200">Professional SMS OTP Management</p>
        </div>

        <div class="glass-effect rounded-2xl shadow-2xl p-8 animate-fadeInUp">
            <h2 class="text-2xl font-bold text-white mb-6 text-center">Welcome Back</h2>

            <form @submit.prevent="login" class="space-y-6">
                <div>
                    <label class="block text-white text-sm font-medium mb-2">
                        <i class="fas fa-user mr-2"></i>Username
                    </label>
                    <input
                        type="text"
                        x-model="username"
                        class="w-full px-4 py-3 bg-white bg-opacity-20 border border-white border-opacity-30 rounded-lg text-white placeholder-purple-200 focus:outline-none focus:ring-2 focus:ring-white focus:border-transparent transition"
                        placeholder="Enter your username"
                        required
                    >
                </div>

                <div>
                    <label class="block text-white text-sm font-medium mb-2">
                        <i class="fas fa-lock mr-2"></i>Password
                    </label>
                    <div class="relative">
                        <input
                            :type="showPassword ? 'text' : 'password'"
                            x-model="password"
                            class="w-full px-4 py-3 bg-white bg-opacity-20 border border-white border-opacity-30 rounded-lg text-white placeholder-purple-200 focus:outline-none focus:ring-2 focus:ring-white focus:border-transparent transition"
                            placeholder="Enter your password"
                            required
                        >
                        <button
                            type="button"
                            @click="showPassword = !showPassword"
                            class="absolute right-3 top-1/2 transform -translate-y-1/2 text-white hover:text-purple-200 transition"
                        >
                            <i :class="showPassword ? 'fas fa-eye-slash' : 'fas fa-eye'"></i>
                        </button>
                    </div>
                </div>

                <div>
                    <label class="block text-white text-sm font-medium mb-2">
                        <i class="fas fa-calculator mr-2"></i>Security Check
                    </label>
                    <div class="flex items-center space-x-3">
                        <div class="flex-1 px-4 py-3 bg-white bg-opacity-20 border border-white border-opacity-30 rounded-lg text-white text-center font-bold">
                            <span x-text="captcha.question"></span>
                        </div>
                        <input
                            type="number"
                            x-model="captchaAnswer"
                            class="w-24 px-4 py-3 bg-white bg-opacity-20 border border-white border-opacity-30 rounded-lg text-white placeholder-purple-200 focus:outline-none focus:ring-2 focus:ring-white focus:border-transparent transition text-center"
                            placeholder="?"
                            required
                        >
                        <button
                            type="button"
                            @click="generateCaptcha"
                            class="px-4 py-3 bg-white bg-opacity-20 border border-white border-opacity-30 rounded-lg text-white hover:bg-opacity-30 transition"
                        >
                            <i class="fas fa-sync-alt"></i>
                        </button>
                    </div>
                </div>

                <div class="flex items-center justify-between">
                    <label class="flex items-center text-white cursor-pointer">
                        <input type="checkbox" x-model="rememberMe" class="mr-2 rounded">
                        <span class="text-sm">Remember me</span>
                    </label>
                    <a href="#" class="text-sm text-white hover:text-purple-200 transition">Forgot password?</a>
                </div>

                <button
                    type="submit"
                    :disabled="loading"
                    class="w-full py-3 bg-white text-purple-600 rounded-lg font-bold hover:bg-opacity-90 transition transform hover:scale-105 disabled:opacity-50 disabled:cursor-not-allowed"
                >
                    <span x-show="!loading">
                        <i class="fas fa-sign-in-alt mr-2"></i>Login
                    </span>
                    <span x-show="loading">
                        <i class="fas fa-spinner fa-spin mr-2"></i>Logging in...
                    </span>
                </button>
            </form>
        </div>

        <div class="text-center mt-6 text-white text-sm animate-fadeInUp" style="animation-delay: 0.2s;">
            <p>&copy; 2026 Sigma SMS A2P. All rights reserved.</p>
            <div class="text-center mt-4">
                <a href="/test-login" class="text-white hover:text-purple-200 transition text-sm">
                    <i class="fas fa-flask mr-2"></i>Access Test Panel
                </a>
            </div>
        </div>
    </div>
</div>

<script>
    function loginForm() {
        return {
            username: '',
            password: '',
            captchaAnswer: '',
            showPassword: false,
            rememberMe: false,
            loading: false,
            captcha: { question: '', answer: 0 },

            init() { this.generateCaptcha(); },

            generateCaptcha() {
                const num1 = Math.floor(Math.random() * 10) + 1;
                const num2 = Math.floor(Math.random() * 10) + 1;
                const operators = ['+', '-', 'x'];
                const operator = operators[Math.floor(Math.random() * operators.length)];
                let displayNum1 = num1, displayNum2 = num2;
                switch(operator) {
                    case '+': this.captcha.answer = displayNum1 + displayNum2; break;
                    case '-': displayNum1 = Math.max(num1, num2); displayNum2 = Math.min(num1, num2); this.captcha.answer = displayNum1 - displayNum2; break;
                    case 'x': this.captcha.answer = displayNum1 * displayNum2; break;
                }
                this.captcha.question = `${displayNum1} ${operator} ${displayNum2} = ?`;
                this.captchaAnswer = '';
            },

            async login() {
                const userAnswer = parseInt(this.captchaAnswer);
                if (isNaN(userAnswer) || userAnswer !== this.captcha.answer) {
                    showToast('Incorrect security check answer. Please try again.', 'error');
                    this.generateCaptcha();
                    return;
                }
                this.loading = true;

                if (this.username === 'test123') {
                    try {
                        const testResp = await fetch('/api/test/login', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ username: this.username, password: this.password })
                        });
                        const testData = await testResp.json();
                        if (testResp.ok) { showToast('Test panel login successful!', 'success'); setTimeout(() => { window.location.href = '/test-dashboard'; }, 1000); return; }
                        else { showToast(testData.detail || 'Login failed', 'error'); this.generateCaptcha(); this.loading = false; return; }
                    } catch (error) { showToast('Network error. Please try again.', 'error'); this.generateCaptcha(); this.loading = false; return; }
                }

                try {
                    const response = await fetch('/api/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username: this.username, password: this.password, captcha_answer: parseInt(this.captchaAnswer) })
                    });
                    const data = await response.json();
                    if (response.ok) { localStorage.setItem('access_token', data.access_token); localStorage.setItem('user', JSON.stringify(data.user)); showToast('Login successful!', 'success'); setTimeout(() => { window.location.href = '/dashboard'; }, 1000); }
                    else { showToast(data.detail || 'Login failed', 'error'); this.generateCaptcha(); }
                } catch (error) { showToast('Network error. Please try again.', 'error'); this.generateCaptcha(); }
                finally { this.loading = false; }
            }
        }
    }
</script>
{% endblock %}
