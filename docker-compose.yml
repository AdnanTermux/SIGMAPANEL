version: '3.8'

services:
  # FastAPI Application
  app:
    build: .
    container_name: sigma-sms-app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mysql+pymysql://sigma_user:sigma_password@db:3306/sigma_sms_a2p
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-change-this-secret-key}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-this-jwt-secret}
    depends_on:
      - db
      - redis
    restart: unless-stopped
    networks:
      - sigma-network
    volumes:
      - ./app:/app/app
      - ./logs:/app/logs

  # MySQL Database
  db:
    image: mysql:8.0
    container_name: sigma-sms-db
    environment:
      - MYSQL_ROOT_PASSWORD=root_password
      - MYSQL_DATABASE=sigma_sms_a2p
      - MYSQL_USER=sigma_user
      - MYSQL_PASSWORD=sigma_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database:/docker-entrypoint-initdb.d
    restart: unless-stopped
    networks:
      - sigma-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: sigma-sms-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - sigma-network

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: sigma-sms-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - sigma-network

volumes:
  mysql_data:
  redis_data:

networks:
  sigma-network:
    driver: bridge
