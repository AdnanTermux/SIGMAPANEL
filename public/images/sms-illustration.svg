<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" fill="none">
  <!-- Background circle -->
  <circle cx="150" cy="150" r="140" fill="rgba(255,255,255,0.08)" />
  <circle cx="150" cy="150" r="110" fill="rgba(255,255,255,0.06)" />
  
  <!-- Phone body -->
  <rect x="95" y="40" width="110" height="220" rx="16" fill="rgba(255,255,255,0.95)" />
  <rect x="100" y="55" width="100" height="185" rx="4" fill="rgba(115,93,255,0.08)" />
  
  <!-- Phone notch -->
  <rect x="135" y="44" width="30" height="4" rx="2" fill="rgba(115,93,255,0.3)" />
  
  <!-- Message bubbles - left side (received) -->
  <rect x="108" y="70" width="70" height="30" rx="8" fill="rgba(255,255,255,0.9)" />
  <rect x="108" y="108" width="55" height="30" rx="8" fill="rgba(255,255,255,0.9)" />
  <rect x="108" y="146" width="65" height="30" rx="8" fill="rgba(255,255,255,0.9)" />
  
  <!-- Message bubbles - right side (sent) -->
  <rect x="122" y="184" width="70" height="30" rx="8" fill="rgba(255,255,255,0.4)" />
  <rect x="130" y="222" width="58" height="30" rx="8" fill="rgba(255,255,255,0.4)" />
  
  <!-- Dots in message bubbles (text lines) -->
  <!-- Left bubbles -->
  <rect x="116" y="80" width="28" height="4" rx="2" fill="#735DFF" opacity="0.3" />
  <rect x="116" y="88" width="40" height="4" rx="2" fill="#735DFF" opacity="0.2" />
  
  <rect x="116" y="118" width="22" height="4" rx="2" fill="#735DFF" opacity="0.3" />
  <rect x="116" y="126" width="34" height="4" rx="2" fill="#735DFF" opacity="0.2" />
  
  <rect x="116" y="156" width="32" height="4" rx="2" fill="#735DFF" opacity="0.3" />
  <rect x="116" y="164" width="38" height="4" rx="2" fill="#735DFF" opacity="0.2" />
  
  <!-- Right bubbles -->
  <rect x="130" y="194" width="30" height="4" rx="2" fill="white" opacity="0.8" />
  <rect x="130" y="202" width="48" height="4" rx="2" fill="white" opacity="0.6" />
  
  <rect x="138" y="232" width="24" height="4" rx="2" fill="white" opacity="0.8" />
  <rect x="138" y="240" width="36" height="4" rx="2" fill="white" opacity="0.6" />
  
  <!-- SMS text lines -->
  <rect x="116" y="82" width="28" height="3" rx="1.5" fill="#735DFF" opacity="0.35" />
  <rect x="116" y="89" width="42" height="3" rx="1.5" fill="#735DFF" opacity="0.2" />
  
  <!-- Send icon on right bubbles -->
  <circle cx="182" cy="199" r="8" fill="rgba(255,255,255,0.3)" />
  <path d="M179 199l3 3 5-6" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Floating message icons -->
  <!-- Top right -->
  <g transform="translate(230, 50)">
    <rect x="0" y="0" width="50" height="36" rx="8" fill="rgba(255,255,255,0.2)" />
    <rect x="8" y="10" width="20" height="3" rx="1.5" fill="white" opacity="0.6" />
    <rect x="8" y="17" width="30" height="3" rx="1.5" fill="white" opacity="0.4" />
    <rect x="8" y="24" width="16" height="3" rx="1.5" fill="white" opacity="0.5" />
  </g>
  
  <!-- Bottom left -->
  <g transform="translate(20, 210)">
    <rect x="0" y="0" width="50" height="36" rx="8" fill="rgba(255,255,255,0.15)" />
    <rect x="8" y="10" width="24" height="3" rx="1.5" fill="white" opacity="0.5" />
    <rect x="8" y="17" width="32" height="3" rx="1.5" fill="white" opacity="0.3" />
    <rect x="8" y="24" width="18" height="3" rx="1.5" fill="white" opacity="0.4" />
  </g>
  
  <!-- Notification bell top left -->
  <g transform="translate(30, 55)">
    <circle cx="15" cy="15" r="15" fill="rgba(255,255,255,0.15)" />
    <path d="M15 8c-3.5 0-6 2.5-6 6v4l-1.5 2h15L21 18v-4c0-3.5-2.5-6-6-6z" stroke="white" stroke-width="1.5" fill="none" opacity="0.7" />
    <path d="M12 20c0 2 1.5 3.5 3 3.5s3-1.5 3-3.5" stroke="white" stroke-width="1.5" fill="none" opacity="0.7" />
  </g>
  
  <!-- Small dots decoration -->
  <circle cx="55" cy="140" r="3" fill="rgba(255,255,255,0.3)" />
  <circle cx="245" cy="150" r="4" fill="rgba(255,255,255,0.25)" />
  <circle cx="50" cy="180" r="2" fill="rgba(255,255,255,0.2)" />
  <circle cx="250" cy="100" r="2.5" fill="rgba(255,255,255,0.2)" />
  
  <!-- Globe/world icon bottom right -->
  <g transform="translate(235, 195)">
    <circle cx="20" cy="20" r="18" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" />
    <ellipse cx="20" cy="20" rx="9" ry="18" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1" />
    <line x1="2" y1="20" x2="38" y2="20" stroke="rgba(255,255,255,0.15)" stroke-width="1" />
    <line x1="5" y1="11" x2="35" y2="11" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
    <line x1="5" y1="29" x2="35" y2="29" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
  </g>
  
  <!-- Delivery arrow -->
  <g transform="translate(20, 130)" opacity="0.3">
    <path d="M5 12l8-7 8 7" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    <path d="M13 5v18" stroke="white" stroke-width="2" stroke-linecap="round" fill="none" />
  </g>
</svg>
